syntax = "proto3";
package adas.common;

// Imported verbatim from adas_vdy (sil/vdy_adapter/data_types/interfaceVDYInterCycle.h:357-363).
// Used ONLY by verified/reference-derived messages: GenObjectList, VehDyn, AebOutputs,
// CompState. Everything else keeps adas.common.Header — see docs/interfaces_types_migration.md §0.5.
message SignalHeader {
  uint32 ui_time_stamp = 1;
  uint32 ui_measurement_counter = 2;
  uint32 ui_cycle_counter = 3;
  uint32 e_sig_status = 4;   // opaque; raw uint8 in reference, not a separate named type
}
