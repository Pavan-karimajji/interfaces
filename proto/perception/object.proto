syntax = "proto3";
package adas.perception;
import "common/common.proto";
import "perception/detection.proto";

message GenObject {
  uint32 object_id = 1;
  ObjectClass object_class = 2;
  adas.common.BoundingBox3D bbox_3d = 3;
  float velocity_x_mps = 4;
  float velocity_y_mps = 5;
  float heading_rad = 6;
  ObjectState state = 7;
  uint32 age_frames = 8;
  float confidence = 9;
}

message GenObjectList {
  adas.common.Header header = 1;
  repeated GenObject objects = 2;
}

enum ObjectState {
  OBJ_TENTATIVE = 0;
  OBJ_CONFIRMED = 1;
  OBJ_COASTING = 2;
  OBJ_DELETED = 3;
}
