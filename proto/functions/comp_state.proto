syntax = "proto3";
package adas.functions;
import "common/common.proto";

// Generic per-function heartbeat/opmode (superproject plan.md §5.4).
// Every function updates this every exec() cycle regardless of state.
message CompState {
  enum State {
    OFF = 0;
    ACTIVE = 1;
    DEGRADED = 2;
    ERROR = 3;
  }
  adas.common.Header header = 1;
  string function = 2;
  State state = 3;
  string reason = 4;
}
